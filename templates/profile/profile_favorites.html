{% extends "profile/base_profile.html" %}

{% block profile_content %}
    <style>

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #3f332b;
            margin-bottom: 30px;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: #fff;
            border: 1px solid #e6ddd5;
            border-radius: 18px;
            overflow: hidden;
            transition: .2s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .06);
        }

        .product-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .product-card h3 {
            padding: 15px 15px 10px;
            margin: 0;
            font-size: 16px;
            color: #3f332b;
        }

        .price {
            padding: 0 15px 15px;
            font-size: 22px;
            font-weight: 700;
            color: #6b4f3a;
        }

        .details-btn {
            display: inline-block;
            margin: 0 15px 15px;
            padding: 10px 18px;
            background: #6b4f3a;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            transition: .2s;
        }

        .details-btn:hover {
            background: #5a4331;
        }

        .empty-favorites {
            padding: 40px;
            text-align: center;
            background: #f7f1eb;
            border-radius: 16px;
            color: #6b4f3a;
        }

    </style>
    <h1 class="page-title">
        Избранные товары
    </h1>

    {% if favorites %}

        <div class="favorites-grid">

            {% for item in favorites %}

                <div class="product-card">

                    <img src="{{ item.product.image.url }}"
                         alt="{{ item.product.name }}">

                    <h3>{{ item.product.name }}</h3>

                    <div class="price">
                        {{ item.product.price }} ₽
                    </div>

                    <a href="{{ item.product.get_absolute_url }}"
                       class="details-btn">
                        Смотреть товар
                    </a>

                </div>

            {% endfor %}

        </div>

    {% else %}

        <div class="empty-favorites">
            У вас пока нет избранных товаров
        </div>

    {% endif %}

{% endblock %}
