{% extends "base.html" %}
{% load static %}

{% block title %}Каталог{% endblock %}

{% block content %}

<div class="container py-4">

    <h2 style="color:#3a2f2a;">Каталог товаров</h2>

    <!-- SEARCH -->
    <form method="GET" style="margin:20px 0;">
        <input type="text"
               name="q"
               placeholder="Поиск товаров..."
               value="{{ query }}"
               style="padding:10px;width:300px;border:1px solid #ddd;border-radius:8px;">

        <button type="submit"
                style="padding:10px 15px;background:#a07c5a;color:white;border:none;border-radius:8px;">
            Поиск
        </button>
    </form>

    <!-- PRODUCTS -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;">

        {% for product in products %}
        <div style="border:1px solid #eee;border-radius:12px;padding:15px;background:white;">

            {% if product.image %}
                <img src="{{ product.image.url }}"
                     style="width:100%;height:200px;object-fit:cover;border-radius:10px;">
            {% else %}
                <div style="height:200px;background:#f5f5f5;border-radius:10px;"></div>
            {% endif %}

            <h4 style="margin:10px 0;color:#3a2f2a;">
                {{ product.name }}
            </h4>

            <p style="color:#8b7355;">
                {{ product.price }} ₽
            </p>

            <a href="{% url 'product_detail' product.id %}"
               style="display:block;text-align:center;padding:8px;background:#a07c5a;color:white;border-radius:8px;text-decoration:none;">
                Открыть
            </a>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
