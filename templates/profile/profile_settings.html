{% extends "profile/base_profile.html" %}

{% block profile_content %}

<h4>Настройки профиля</h4>

<form method="post">
    {% csrf_token %}

    <div>
        <label>Имя</label>
        {{ form.first_name }}
    </div>

    <div>
        <label>Email</label>
        {{ form.email }}
    </div>

    <button type="submit">
        Сохранить
    </button>
</form>

{% endblock %}
