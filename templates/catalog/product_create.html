{% extends "base.html" %}

{% block title %}
Создание товара
{% endblock %}

{% block content %}

<style>

.page-wrap{
    max-width:900px;
    margin:40px auto;
}

.form-card{
    background:#f7f1eb;
    padding:35px;
    border-radius:24px;
}

.page-title{
    font-size:42px;
    font-weight:700;
    color:#3a2f2a;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#3a2f2a;
}

.form-input,
.form-textarea,
.form-select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:14px;
    box-sizing:border-box;
    font-size:16px;
}

.form-textarea{
    min-height:180px;
    resize:vertical;
}

.actions{
    display:flex;
    gap:15px;
    margin-top:30px;
}

.btn-main{
    border:none;
    background:#6b4f3a;
    color:white;
    padding:14px 25px;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
}

.btn-main:hover{
    background:#4f3929;
}

.btn-back{
    text-decoration:none;
    background:#ddd;
    color:#333;
    padding:14px 25px;
    border-radius:14px;
    font-weight:700;
}

</style>

<div class="page-wrap">

    <h1 class="page-title">
        Добавление товара
    </h1>

    <div class="form-card">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="actions">
                <button type="submit" class="btn-main">
                    Сохранить товар
                </button>

                <a href="{% url 'catalog' %}" class="btn-back">
                    Назад
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
